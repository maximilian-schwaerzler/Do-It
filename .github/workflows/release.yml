name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Allow Docker container to write to workspace
        run: chmod -R a+w .

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      - name: Write keystore.properties
        run: |
          printf 'storeFile=keystore.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "${{ secrets.KEYSTORE_PASSWORD }}" \
            "${{ secrets.KEY_ALIAS }}" \
            "${{ secrets.KEY_PASSWORD }}" > keystore.properties

      - name: Build release APK
        run: |
          docker run --rm \
            --entrypoint bash \
            -v "$GITHUB_WORKSPACE:/build" \
            -w /build \
            registry.gitlab.com/fdroid/docker-executable-fdroidserver:latest \
            -c "
              yes | sdkmanager --licenses > /dev/null 2>&1 || true
              sdkmanager 'build-tools;36.0.0' 'platforms;android-36'
              chmod +x gradlew
              ./gradlew assembleRelease --no-daemon
            "

      - name: Fix permissions on build output
        run: sudo chown -R "$USER:$USER" app/build

      - name: Rename APK
        run: mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/Do-It-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/Do-It-release.apk
